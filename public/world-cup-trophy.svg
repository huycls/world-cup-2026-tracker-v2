<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 90" role="img" aria-label="FIFA World Cup Trophy">
  <defs>
    <linearGradient id="trophy-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6a8"/>
      <stop offset="40%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9a7b1a"/>
    </linearGradient>
    <linearGradient id="trophy-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8dc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="trophy-glow" cx="50%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="40" cy="82" rx="28" ry="5" fill="url(#trophy-glow)"/>

  <!-- Base -->
  <path d="M24 72h32v4c0 2.2-1.8 4-4 4H28c-2.2 0-4-1.8-4-4v-4z" fill="url(#trophy-gold)"/>
  <rect x="36" y="58" width="8" height="14" rx="1.5" fill="url(#trophy-gold)"/>
  <path d="M30 54h20v5c0 1.7-1.3 3-3 3H33c-1.7 0-3-1.3-3-3v-5z" fill="url(#trophy-gold)"/>

  <!-- Cup body -->
  <path d="M18 22c0-12 9.8-22 22-22s22 10 22 22c0 8.5-4.9 15.8-12 19.3V54H30v-12.7c-7.1-3.5-12-10.8-12-19.3z" fill="url(#trophy-gold)"/>
  <path d="M24 24c0-8.8 7.2-16 16-16s16 7.2 16 16c0 6.2-3.5 11.6-8.7 14.3l-1.3.7V50H34v-10.9l-1.3-.7C27.5 35.6 24 30.2 24 24z" fill="url(#trophy-shine)"/>

  <!-- Handles -->
  <path d="M18 28c-6 2-10 7.5-10 14 0 4.2 2.2 7.9 5.5 10" fill="none" stroke="url(#trophy-gold)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M62 28c6 2 10 7.5 10 14 0 4.2-2.2 7.9-5.5 10" fill="none" stroke="url(#trophy-gold)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Globe detail -->
  <circle cx="40" cy="24" r="7" fill="none" stroke="#f5e6a8" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="40" cy="24" rx="7" ry="3.2" fill="none" stroke="#f5e6a8" stroke-width="0.9" opacity="0.55"/>
  <path d="M33 24h14M40 17v14" stroke="#f5e6a8" stroke-width="0.8" opacity="0.45"/>
</svg>
